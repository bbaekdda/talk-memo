<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>톡메모 - 채팅처럼 간편한 메모</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #app { height: 100%; }
body { font-family: 'Apple SD Gothic Neo','Pretendard','Malgun Gothic',sans-serif; background: #f5f5f7; color: #1a1a1a; font-size: 14px; }
button { border: none; cursor: pointer; background: none; color: inherit; font: inherit; }
textarea, input { font: inherit; color: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
#app { display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: 56px; flex-shrink: 0; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 6px; }
.logo-btn { width: 36px; height: 36px; background: #2563eb; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 8px; flex-shrink: 0; }
.sidebar-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #aaa; transition: all .15s; position: relative; }
.sidebar-btn:hover { background: #f0f4ff; color: #555; }
.sidebar-btn.active { background: #dbeafe; color: #2563eb; }
.sidebar-spacer { flex: 1; }
.badge { position: absolute; top: -3px; right: -3px; min-width: 16px; height: 16px; background: #2563eb; border-radius: 8px; font-size: 9px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#header { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #e5e7eb; background: #fff; }
#header h1 { font-size: 15px; font-weight: 700; color: #111; }
.stat-badge { padding: 2px 10px; border-radius: 20px; font-size: 11px; background: #f3f4f6; color: #888; border: 1px solid #e5e7eb; }
#header-spacer { flex: 1; }
#filter-btn { padding: 4px 10px; border-radius: 8px; font-size: 11px; border: 1px solid #e5e7eb; color: #888; transition: all .15s; background: #fff; }
#filter-btn:hover { color: #333; border-color: #ccc; }
#filter-btn.on { background: #eff6ff; border-color: #93c5fd; color: #2563eb; }
#search-bar { flex-shrink: 0; display: flex; align-items: center; padding: 8px 16px; border-bottom: 1px solid #f0f0f0; background: #fff; }
#search-input { width: 100%; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 10px; padding: 7px 12px; font-size: 13px; color: #111; outline: none; transition: border-color .15s; }
#search-input::placeholder { color: #bbb; }
#search-input:focus { border-color: #93c5fd; background: #fff; }
#cat-bar { flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 8px 16px; overflow-x: auto; border-bottom: 1px solid #f0f0f0; background: #fff; }
#cat-bar::-webkit-scrollbar { display: none; }
.cat-filter-btn { display: flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; white-space: nowrap; border: 1px solid transparent; color: #aaa; transition: all .15s; background: #f3f4f6; }
.cat-filter-btn:hover { color: #555; background: #e9ecf0; }
.cat-filter-btn.active { color: #fff; }
.cat-dot { width: 6px; height: 6px; border-radius: 50%; }
#list { flex: 1; overflow-y: auto; padding: 8px 16px; background: #f5f5f7; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #ccc; text-align: center; }
.empty-state .big { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; margin-top: 4px; color: #bbb; }
.date-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
.date-divider span { font-size: 11px; color: #bbb; }
.item-card { position: relative; border-radius: 14px; background: #fff; border: 1px solid #e5e7eb; margin-bottom: 10px; overflow: hidden; animation: fadeUp .2s ease; transition: box-shadow .15s, border-color .15s; }
.item-card:hover { border-color: #d1d5db; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.item-card.done { opacity: .5; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.color-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.card-inner { padding: 10px 12px 10px 14px; display: flex; align-items: flex-start; gap: 8px; }
.check-btn { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d1d5db; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all .15s; }
.check-btn:hover { border-color: #93c5fd; }
.check-btn.checked { border-color: transparent; color: #fff; }
.memo-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.card-body { flex: 1; min-width: 0; }
.card-text { font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #1a1a1a; }
.card-text.done-text { text-decoration: line-through; color: #bbb; }
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag-pill { padding: 1px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.deadline-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 11px; margin-top: 5px; }
.deadline-badge.overdue { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
.deadline-badge.today { background: #fffbeb; color: #f59e0b; border: 1px solid #fde68a; }
.deadline-badge.upcoming { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
.card-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.meta-cat { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #999; }
.meta-dot { width: 5px; height: 5px; border-radius: 50%; }
.meta-time { font-size: 11px; color: #ccc; }
.card-actions { display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: opacity .15s; }
.item-card:hover .card-actions { opacity: 1; }
.action-btn { font-size: 14px; padding: 2px; transition: color .15s; }
.action-btn.fav { color: #ccc; }
.action-btn.fav.on { color: #f59e0b; }
.action-btn.del { color: #ddd; }
.action-btn.del:hover { color: #ef4444; }
#input-area { flex-shrink: 0; border-top: 1px solid #e5e7eb; background: #fff; padding: 10px 14px; position: relative; }
.tag-preview { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.preview-tag { display: flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
.input-row { display: flex; align-items: flex-end; gap: 8px; }
#text-input { flex: 1; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 12px; padding: 9px 12px; font-size: 13px; color: #111; outline: none; transition: border-color .15s, background .15s; resize: none; line-height: 1.5; min-height: 40px; max-height: 120px; }
#text-input::placeholder { color: #bbb; }
#text-input:focus { border-color: #93c5fd; background: #fff; }
#send-btn { padding: 9px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; background: #2563eb; color: #fff; transition: all .15s; flex-shrink: 0; }
#send-btn:hover { background: #1d4ed8; }
#send-btn:disabled { background: #e5e7eb; color: #bbb; cursor: not-allowed; }
#deadline-bar { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
#deadline-bar label { font-size: 11px; color: #aaa; }
#dl-date-input, #dl-time-input { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px; padding: 3px 8px; font-size: 11px; color: #555; outline: none; transition: border-color .15s; }
#dl-date-input:focus, #dl-time-input:focus { border-color: #93c5fd; }
#dl-clear-btn { padding: 3px 10px; border-radius: 8px; font-size: 11px; border: 1px solid #fecaca; color: #ef4444; background: #fef2f2; }
#cat-popup { position: absolute; bottom: calc(100% + 8px); left: 14px; width: 288px; background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); padding: 14px; z-index: 100; display: none; }
#cat-popup.show { display: block; }
.popup-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.popup-tab { flex: 1; padding: 5px; border-radius: 8px; font-size: 12px; text-align: center; border: 1px solid #e5e7eb; color: #aaa; transition: all .15s; background: #f3f4f6; }
.popup-tab.active { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
.popup-label { font-size: 11px; color: #bbb; margin-bottom: 8px; }
.popup-cats { display: flex; flex-wrap: wrap; gap: 6px; }
.popup-cat { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; background: #f3f4f6; border: 1px solid #e5e7eb; color: #555; cursor: pointer; transition: all .15s; }
.popup-cat:hover { border-color: #ccc; background: #e9ecf0; }
.popup-cat.selected { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
#cal-view { flex: 1; overflow-y: auto; padding: 16px; display: none; flex-direction: column; gap: 14px; background: #f5f5f7; }
#cal-view.show { display: flex; }
#cal-header { display: flex; align-items: center; justify-content: space-between; }
#cal-header h2 { font-size: 16px; font-weight: 700; color: #111; }
.cal-nav { width: 32px; height: 32px; border-radius: 8px; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #aaa; transition: all .15s; cursor: pointer; background: #fff; border: 1px solid #e5e7eb; }
.cal-nav:hover { background: #f0f4ff; color: #2563eb; }
#cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { text-align: center; font-size: 11px; color: #bbb; padding: 4px 0; font-weight: 600; }
.cal-day { aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 6px 2px 4px; cursor: pointer; transition: all .15s; background: #fff; border: 1px solid #e5e7eb; }
.cal-day:hover { background: #f0f4ff; border-color: #bfdbfe; }
.cal-day.today { border-color: #2563eb; background: #eff6ff; }
.cal-day.selected { background: #2563eb; border-color: #2563eb; }
.cal-day.other-month .cal-day-num { color: #ddd; }
.cal-day-num { font-size: 12px; font-weight: 600; color: #555; line-height: 1; }
.cal-day.today .cal-day-num { color: #2563eb; }
.cal-day.selected .cal-day-num { color: #fff; }
.cal-dots { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; margin-top: 4px; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; }
#cal-selected-label { font-size: 13px; color: #aaa; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }
#cal-items { display: flex; flex-direction: column; gap: 6px; }
.cal-item { display: flex; align-items: flex-start; gap: 8px; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 10px; position: relative; overflow: hidden; transition: box-shadow .15s; }
.cal-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.cal-color-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.cal-check { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #d1d5db; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 9px; cursor: pointer; transition: all .15s; }
.cal-check.checked { border-color: transparent; color: #fff; }
.cal-item-text { font-size: 12px; color: #444; line-height: 1.5; flex: 1; }
.cal-item-time { font-size: 11px; color: #ccc; white-space: nowrap; }
#fav-view { flex: 1; overflow-y: auto; padding: 8px 16px; display: none; background: #f5f5f7; }
#fav-view.show { display: block; }
#settings-view { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; gap: 16px; background: #f5f5f7; }
#settings-view.show { display: flex; }
.setting-section { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; overflow: hidden; }
.setting-section-title { font-size: 11px; color: #bbb; padding: 12px 16px 6px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
.setting-row { display: flex; align-items: center; padding: 12px 16px; border-top: 1px solid #f3f4f6; gap: 10px; }
.setting-label { flex: 1; font-size: 13px; color: #333; }
.setting-desc { font-size: 11px; color: #bbb; margin-top: 2px; }
.toggle { width: 40px; height: 22px; background: #d1d5db; border-radius: 11px; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
.toggle.on { background: #2563eb; }
.toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
.toggle.on::after { transform: translateX(18px); }
.cat-manage-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-top: 1px solid #f3f4f6; }
.cat-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-manage-name { flex: 1; font-size: 13px; color: #333; }
.cat-del-btn { font-size: 16px; color: #ddd; transition: color .15s; }
.cat-del-btn:hover { color: #ef4444; }
.add-cat-row { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid #f3f4f6; align-items: center; }
.add-cat-input { flex: 1; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px 10px; font-size: 12px; color: #333; outline: none; }
.add-cat-input:focus { border-color: #93c5fd; background: #fff; }
.add-cat-btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; background: #2563eb; color: #fff; }
.color-picker-row { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px; border-top: 1px solid #f3f4f6; }
.color-swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; flex-shrink: 0; }
.color-swatch.selected { border-color: #1a1a1a; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="logo-btn">💬</div>
    <button class="sidebar-btn active" id="btn-list" title="메모 목록" onclick="switchView('list')">📋</button>
    <button class="sidebar-btn" id="btn-cal" title="캘린더" onclick="switchView('cal')">📅</button>
    <button class="sidebar-btn" id="btn-fav" title="즐겨찾기" onclick="switchView('fav')">⭐</button>
    <div class="sidebar-spacer"></div>
    <button class="sidebar-btn" id="btn-settings" title="설정" onclick="switchView('settings')">⚙️</button>
  </div>
  <div id="main">
    <div id="header">
      <h1 id="view-title">전체 메모</h1>
      <span class="stat-badge" id="stat-badge">0개</span>
      <div id="header-spacer"></div>
      <button id="filter-btn" onclick="toggleFilterDone()">✅ 미완료만</button>
    </div>
    <div id="search-bar">
      <input id="search-input" placeholder="🔍  메모 검색..." oninput="renderList()"/>
    </div>
    <div id="cat-bar"></div>
    <div id="list"></div>
    <div id="cal-view">
      <div id="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <h2 id="cal-title"></h2>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div id="cal-grid"></div>
      <div id="cal-selected-label"></div>
      <div id="cal-items"></div>
    </div>
    <div id="fav-view"></div>
    <div id="settings-view">
      <div class="setting-section">
        <div class="setting-section-title">카테고리 관리</div>
        <div id="cat-list-manage"></div>
        <div class="color-picker-row" id="color-picker-row"></div>
        <div class="add-cat-row">
          <input class="add-cat-input" id="new-cat-name" placeholder="새 카테고리 이름..."/>
          <button class="add-cat-btn" onclick="addCategory()">추가</button>
        </div>
      </div>
      <div class="setting-section">
        <div class="setting-section-title">보기 옵션</div>
        <div class="setting-row">
          <div><div class="setting-label">완료 항목 숨기기</div><div class="setting-desc">완료된 메모를 목록에서 숨깁니다</div></div>
          <div class="toggle" id="toggle-hideDone" onclick="toggleSetting('hideDone')"></div>
        </div>
        <div class="setting-row">
          <div><div class="setting-label">날짜 구분선 표시</div><div class="setting-desc">날짜별로 메모를 구분하여 표시합니다</div></div>
          <div class="toggle on" id="toggle-showDivider" onclick="toggleSetting('showDivider')"></div>
        </div>
      </div>
      <div class="setting-section">
        <div class="setting-section-title">데이터</div>
        <div class="setting-row">
          <div class="setting-label">전체 데이터 초기화</div>
          <button onclick="resetAll()" style="padding:4px 12px;border-radius:8px;font-size:12px;border:1px solid #fecaca;color:#ef4444;background:#fef2f2;">초기화</button>
        </div>
      </div>
    </div>
    <div id="input-area">
      <div id="cat-popup">
        <div class="popup-tabs">
          <button class="popup-tab active" id="pt-todo" onclick="setInputType('todo')">📋 할일</button>
          <button class="popup-tab" id="pt-memo" onclick="setInputType('memo')">📝 기록</button>
        </div>
        <div class="popup-label">카테고리 선택</div>
        <div class="popup-cats" id="popup-cats"></div>
      </div>
      <div class="tag-preview" id="tag-preview" style="display:none;"></div>
      <div id="deadline-bar" style="display:none;">
        <label>📅 마감일</label>
        <input type="date" id="dl-date-input" oninput="renderTagPreview()"/>
        <input type="time" id="dl-time-input" oninput="renderTagPreview()"/>
        <button id="dl-clear-btn" onclick="clearDeadline()">✕ 제거</button>
      </div>
      <div class="input-row">
        <button id="cat-open-btn" onclick="toggleCatPopup()" title="카테고리/타입 선택" style="font-size:20px;color:#ccc;flex-shrink:0;padding:2px 4px;transition:color .15s;" onmouseover="this.style.color='#2563eb'" onmouseout="this.style.color='#ccc'">⊕</button>
        <textarea id="text-input" placeholder="메모를 입력하세요... (Enter: 전송 / Shift+Enter: 줄바꿈)" rows="1" oninput="autoResize(this);checkSendBtn()" onkeydown="handleKey(event)"></textarea>
        <button id="send-btn" onclick="sendMemo()" disabled>전송</button>
      </div>
    </div>
  </div>
</div>
<script>
const SKEY='talkmemo_v2',CKEY='talkmemo_cats_v2',PKEY='talkmemo_settings';
const CAT_COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];
let items=[],categories=[],settings={hideDone:false,showDivider:true};
let selectedCats=[],selectedType='todo',dlDate='',dlTime='';
let filterDoneOnly=false,filterCat='all',currentView='list';
let calYear,calMonth,calSelectedDate,newCatColor=CAT_COLORS[0];

function load(){
  try{items=JSON.parse(localStorage.getItem(SKEY))||[];}catch(e){items=[];}
  try{categories=JSON.parse(localStorage.getItem(CKEY))||defaultCats();}catch(e){categories=defaultCats();}
  try{var s=JSON.parse(localStorage.getItem(PKEY));if(s)settings=Object.assign({},settings,s);}catch(e){}
}
function save(){
  localStorage.setItem(SKEY,JSON.stringify(items));
  localStorage.setItem(CKEY,JSON.stringify(categories));
  localStorage.setItem(PKEY,JSON.stringify(settings));
}
function defaultCats(){
  return [
    {id:'미지정',name:'미지정',color:'#aaa'},
    {id:'직장',name:'직장',color:'#3b82f6'},
    {id:'개인',name:'개인',color:'#10b981'},
    {id:'학교',name:'학교',color:'#f59e0b'},
    {id:'약속',name:'약속',color:'#ef4444'},
    {id:'집안일',name:'집안일',color:'#8b5cf6'},
    {id:'과제',name:'과제',color:'#ec4899'}
  ];
}
function getCat(id){return categories.find(function(c){return c.id===id;})||{name:id,color:'#aaa'};}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pad(n){return String(n).padStart(2,'0');}
function fmtDateShort(ts){var d=new Date(ts);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtDate(ts){return new Date(ts).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}

function switchView(v){
  currentView=v;
  document.querySelectorAll('.sidebar-btn').forEach(function(b){b.classList.remove('active');});
  var sb=document.getElementById('btn-'+v);if(sb)sb.classList.add('active');
  var listEl=document.getElementById('list');
  var calEl=document.getElementById('cal-view');
  var favEl=document.getElementById('fav-view');
  var setEl=document.getElementById('settings-view');
  var inp=document.getElementById('input-area');
  var srch=document.getElementById('search-bar');
  var catB=document.getElementById('cat-bar');
  var fBtn=document.getElementById('filter-btn');
  listEl.style.display='none';
  calEl.classList.remove('show');favEl.classList.remove('show');setEl.classList.remove('show');
  srch.style.display='';catB.style.display='';fBtn.style.display='';inp.style.display='';
  var titles={list:'전체 메모',cal:'캘린더',fav:'즐겨찾기',settings:'설정'};
  document.getElementById('view-title').textContent=titles[v]||'';
  if(v==='list'){listEl.style.display='';renderCatBar();renderList();}
  else if(v==='cal'){calEl.classList.add('show');inp.style.display='none';srch.style.display='none';catB.style.display='none';fBtn.style.display='none';renderCalendar();}
  else if(v==='fav'){favEl.classList.add('show');catB.style.display='none';fBtn.style.display='none';renderFav();}
  else if(v==='settings'){setEl.classList.add('show');inp.style.display='none';srch.style.display='none';catB.style.display='none';fBtn.style.display='none';renderSettings();}
  updateStatBadge();
}

function renderCatBar(){
  var bar=document.getElementById('cat-bar');bar.innerHTML='';
  function mkBtn(label,val,color){
    var b=document.createElement('button');
    b.className='cat-filter-btn'+(filterCat===val?' active':'');
    if(filterCat===val&&color){b.style.background=color;b.style.borderColor=color;}
    if(val==='all'){b.textContent=label;}
    else{b.innerHTML='<span class="cat-dot" style="background:'+color+'"></span>'+label;}
    b.onclick=function(){filterCat=val;renderCatBar();renderList();};
    bar.appendChild(b);
  }
  mkBtn('전체','all','#2563eb');
  categories.forEach(function(c){mkBtn(c.name,c.id,c.color);});
}

function renderList(){
  var el=document.getElementById('list');
  var q=(document.getElementById('search-input').value||'').toLowerCase();
  var list=items.filter(function(it){
    if(filterDoneOnly&&it.done)return false;
    if(settings.hideDone&&it.done)return false;
    if(filterCat!=='all'&&it.cats.indexOf(filterCat)===-1)return false;
    if(q&&it.text.toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
  updateStatBadge();
  if(!list.length){
    el.innerHTML='<div class="empty-state"><div class="big">💬</div><p style="font-size:15px;color:#bbb;font-weight:600;">메모가 없어요</p><p>아래 입력창에서 새 메모를 추가해보세요</p></div>';
    return;
  }
  var html='',lastDate='';
  list.slice().reverse().forEach(function(it){
    if(settings.showDivider){
      var ds=fmtDate(it.createdAt);
      if(ds!==lastDate){html+='<div class="date-divider"><span>'+ds+'</span></div>';lastDate=ds;}
    }
    html+=renderCard(it);
  });
  el.innerHTML=html;
}
